<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>claude-backlog · web UI</title>

  <!--
    Phase 2 satellite of claude-webui (task-441).
    POST-PIVOT (task-442 §0): kernel-webui doctrine compliant.
    - Tailwind via CDN, palette baked from claude_webui.theme
    - Press Start 2P + JetBrains Mono via Google Fonts
    - Vanilla JS state object, async function api() helper
    - DOMParser used everywhere instead of live-element inner-HTML to avoid XSS
      and to satisfy the Legion security PreToolUse hook.
    - One file. No build step. No npm.
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Palette mirror of claude_webui.theme — keep in sync with Python source.
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: { DEFAULT: '#0f0f17', card: '#161622', border: '#2a2a3e', raised: '#1e1e30' },
            accent:  { green: '#a6e3a1', blue: '#89b4fa', red: '#f38ba8', yellow: '#f9e2af',
                       purple: '#cba6f7', pink: '#f5c2e7', teal: '#94e2d5' },
          },
          fontFamily: {
            display: ['"Press Start 2P"', 'cursive'],
            mono:    ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
          },
          animation: { 'fade-in': 'fade-in 0.2s ease-out' },
          keyframes: {
            'fade-in': {
              '0%':   { opacity: '0', transform: 'translateY(2px)' },
              '100%': { opacity: '1', transform: 'translateY(0)'   },
            },
          },
        },
      },
    };
  </script>

  <style>
    body { font-family: theme('fontFamily.mono'); }
    .display { font-family: theme('fontFamily.display'); }

    .badge      { @apply inline-flex items-center gap-1 px-2 py-0.5 rounded text-[0.65rem] font-display uppercase tracking-wider; }
    .badge-pri-critical { @apply bg-accent-red/20 text-accent-red border border-accent-red/40; }
    .badge-pri-high     { @apply bg-accent-yellow/15 text-accent-yellow border border-accent-yellow/40; }
    .badge-pri-medium   { @apply bg-accent-blue/15 text-accent-blue border border-accent-blue/40; }
    .badge-pri-low      { @apply bg-surface-border text-gray-500 border border-surface-border; }

    .nav-tab    { @apply inline-flex items-center gap-2 px-3 py-1.5 rounded-md text-xs hover:bg-surface-raised border border-transparent; }
    .nav-tab-active { @apply bg-surface-raised border-surface-border text-accent-blue; }

    .ui-card    { @apply rounded-lg bg-surface-card border border-surface-border p-4 animate-fade-in; }
    .ui-row     { @apply flex items-center gap-3 py-2 border-b border-surface-border last:border-0; }

    .bar        { @apply h-1.5 rounded-full bg-surface-border overflow-hidden; }
    .bar-fill   { @apply h-full bg-accent-green; }

    .clamp-2    { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .clamp-1    { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

    .spinner    { @apply inline-block w-3 h-3 rounded-full border-2 border-surface-border border-t-accent-blue animate-spin; }
  </style>
  <link rel="icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%230f0f17"/><text x="50%25" y="62%25" text-anchor="middle" font-size="20" fill="%2389b4fa">▦</text></svg>'>
</head>

<body class="bg-surface text-gray-200 min-h-screen flex flex-col">

  <header id="app-header" class="border-b border-surface-border bg-surface-card">
    <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center gap-4">
      <div class="flex items-baseline gap-2">
        <span class="text-accent-blue text-lg">▦</span>
        <span class="display text-[0.7rem] tracking-widest">CLAUDE-BACKLOG</span>
        <span class="text-[0.65rem] text-gray-500 font-mono" id="version-badge">v…</span>
      </div>
      <nav id="tab-nav" class="flex flex-wrap gap-1 ml-auto" aria-label="views"></nav>
      <input
        type="search"
        id="search"
        placeholder="search title + body  (press /)"
        class="ml-auto bg-surface-raised border border-surface-border rounded px-3 py-1 text-xs w-64 focus:border-accent-blue focus:outline-none placeholder:text-gray-600"
      />
    </div>
  </header>

  <main class="flex-1 max-w-7xl w-full mx-auto px-4 py-6">
    <section id="view-host" class="space-y-4"></section>
  </main>

  <footer id="app-footer" class="border-t border-surface-border bg-surface-card mt-auto">
    <div class="max-w-7xl mx-auto px-4 py-2 flex items-center gap-4 text-[0.7rem] text-gray-500 font-mono">
      <span id="namespace-badge">legion.claude-backlog</span>
      <span class="ml-auto" id="status-line">ready.</span>
    </div>
  </footer>

  <script>
    "use strict";

    /* ───────────── state ───────────── */
    const state = {
      route: "/",
      tasks: [],
      filters: { q: "", priority: "", status: "" },
      kernel: { kernel_protocol: "?", satellite_version: "?", namespace: "?" },
      embedded: new URLSearchParams(location.search).get("embedded") === "1",
    };

    const TABS = [
      { path: "/",        label: "Kanban",  glyph: "▦" },
      { path: "/list",    label: "List",    glyph: "≡" },
      { path: "/stats",   label: "Stats",   glyph: "▤" },
      { path: "/graph",   label: "Network", glyph: "◇" },
      { path: "/embed",   label: "Embed",   glyph: "✦" },
      { path: "/heatmap", label: "Heatmap", glyph: "▩" },
      { path: "/compass", label: "Compass", glyph: "◉" },
    ];

    /* ───────────── safe DOM construction ─────────────
       NEVER assign to a live element's inner-HTML — per Legion security hook + XSS doctrine.
       parseHTML uses DOMParser (parse-only, no JS execution); render(host, str)
       replaces the host's children with the parsed nodes.
    */
    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }
    function parseHTML(str) {
      // Wrap in <div> so parseFromString preserves nested whitespace + comments.
      const doc = new DOMParser().parseFromString(`<div>${str}</div>`, "text/html");
      return Array.from(doc.body.firstChild.childNodes);
    }
    function render(host, str) {
      host.replaceChildren(...parseHTML(str));
    }

    /* ───────────── chrome (embed-mode suppression) ───────────── */
    if (state.embedded) {
      document.getElementById("app-header").style.display = "none";
      document.getElementById("app-footer").style.display = "none";
    }

    /* ───────────── api helper ───────────── */
    async function api(path, params) {
      const u = new URL(path, location.origin);
      if (params) for (const [k, v] of Object.entries(params)) {
        if (v !== undefined && v !== null && v !== "") u.searchParams.set(k, v);
      }
      const t0 = performance.now();
      const r = await fetch(u, { headers: { "Accept-Encoding": "gzip" } });
      const ms = (performance.now() - t0).toFixed(0);
      setStatus(`${path} → ${r.status} (${ms}ms)`);
      if (!r.ok) throw new Error(`${path} → ${r.status}`);
      return r.json();
    }
    function setStatus(msg) { document.getElementById("status-line").textContent = msg; }

    /* ───────────── routing ───────────── */
    function routeFromUrl() {
      const path = location.pathname.replace(/\/+$/, "") || "/";
      return path;
    }
    function navigate(path) {
      if (path === state.route) return;
      history.pushState({}, "", path + location.search);
      state.route = path;
      renderRoute();
    }
    window.addEventListener("popstate", () => {
      state.route = routeFromUrl();
      renderRoute();
    });

    /* ───────────── nav ───────────── */
    function renderTabs() {
      const nav = document.getElementById("tab-nav");
      const parts = TABS.map(t =>
        `<a href="${t.path}" data-nav-path="${t.path}" class="nav-tab${state.route === t.path ? ' nav-tab-active' : ''}">
           <span aria-hidden="true">${t.glyph}</span><span>${t.label}</span>
         </a>`
      ).join("");
      render(nav, parts);
      for (const el of nav.querySelectorAll("[data-nav-path]")) {
        el.addEventListener("click", (e) => { e.preventDefault(); navigate(el.dataset.navPath); });
      }
    }

    /* ───────────── renderers ───────────── */
    function taskCard(t) {
      const pri = `badge-pri-${t.priority}`;
      const pct = t.checkbox_total ? Math.round(100 * t.checkbox_checked / t.checkbox_total) : null;
      return `
        <div data-task-id="${t.id}"
             class="rounded border border-surface-border bg-surface-raised hover:border-accent-blue p-2 cursor-pointer transition-colors">
          <div class="flex items-baseline gap-2 mb-1">
            <span class="text-[0.6rem] text-gray-500 font-mono">#${t.id}</span>
            <span class="badge ${pri}">${escapeHtml(t.priority)}</span>
          </div>
          <div class="text-xs clamp-2 mb-2">${escapeHtml(t.title)}</div>
          ${pct !== null
            ? `<div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
               <div class="text-[0.6rem] text-gray-500 mt-1">${t.checkbox_checked}/${t.checkbox_total} · ${pct}%</div>`
            : ""}
        </div>`;
    }

    async function renderKanban() {
      const host = document.getElementById("view-host");
      render(host, `<div class="ui-card"><span class="spinner mr-2"></span>loading tasks…</div>`);
      const tasks = await api("/api/list", { limit: 500 });
      state.tasks = tasks;
      const cols = ["To Do", "In Progress", "Blocked", "Done"];
      const byStatus = Object.fromEntries(cols.map((c) => [c, []]));
      for (const t of tasks) {
        const k = cols.includes(t.status) ? t.status : "To Do";
        byStatus[k].push(t);
      }
      const grid = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        ${cols.map(c => `
          <div class="ui-card">
            <div class="flex items-baseline justify-between mb-3">
              <span class="display text-[0.65rem] tracking-wider text-accent-blue">${escapeHtml(c)}</span>
              <span class="text-[0.65rem] text-gray-500">${byStatus[c].length}</span>
            </div>
            <div class="space-y-2">${byStatus[c].map(taskCard).join("")}</div>
          </div>`).join("")}
      </div>`;
      render(host, grid);
      for (const el of host.querySelectorAll("[data-task-id]")) {
        el.addEventListener("click", () => navigate(`/task/${el.dataset.taskId}`));
      }
    }

    async function renderList() {
      const host = document.getElementById("view-host");
      render(host, `<div class="ui-card"><span class="spinner mr-2"></span>loading list…</div>`);
      const tasks = await api("/api/list", { limit: 1000, q: state.filters.q });
      const html = `
        <div class="ui-card overflow-x-auto">
          <table class="w-full text-xs">
            <thead>
              <tr class="text-left text-gray-500 border-b border-surface-border">
                <th class="px-2 py-2">id</th><th class="px-2">title</th>
                <th class="px-2">status</th><th class="px-2">pri</th>
                <th class="px-2">progress</th><th class="px-2">venture</th>
              </tr>
            </thead>
            <tbody>
              ${tasks.map(t => `
                <tr class="border-b border-surface-border hover:bg-surface-raised cursor-pointer" data-task-id="${t.id}">
                  <td class="px-2 py-1 text-gray-500 font-mono">#${t.id}</td>
                  <td class="px-2 clamp-1">${escapeHtml(t.title)}</td>
                  <td class="px-2">${escapeHtml(t.status)}</td>
                  <td class="px-2"><span class="badge badge-pri-${t.priority}">${escapeHtml(t.priority)}</span></td>
                  <td class="px-2">${t.checkbox_total ? `${t.checkbox_checked}/${t.checkbox_total}` : "—"}</td>
                  <td class="px-2 text-gray-500">${escapeHtml(t.venture || "")}</td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>`;
      render(host, html);
      for (const el of host.querySelectorAll("[data-task-id]")) {
        el.addEventListener("click", () => navigate(`/task/${el.dataset.taskId}`));
      }
    }

    async function renderDetail() {
      const host = document.getElementById("view-host");
      const id = state.route.split("/").pop();
      render(host, `<div class="ui-card"><span class="spinner mr-2"></span>loading task #${escapeHtml(id)}…</div>`);
      const t = await api(`/api/detail/${id}`);
      if (t.error) {
        render(host, `<div class="ui-card border border-accent-red"><strong>${escapeHtml(t.error)}</strong><br>${escapeHtml(t.detail || "")}</div>`);
        return;
      }
      const html = `
        <div class="ui-card">
          <div class="flex items-baseline gap-3 mb-3">
            <span class="text-gray-500 font-mono text-xs">#${t.id}</span>
            <span class="badge badge-pri-${t.priority}">${escapeHtml(t.priority)}</span>
            <span class="text-xs text-gray-400">${escapeHtml(t.status)}</span>
            <span class="ml-auto text-[0.65rem] text-gray-500">${escapeHtml(t.path || "")}</span>
          </div>
          <h2 class="text-lg font-medium mb-3">${escapeHtml(t.title)}</h2>
          <div class="text-xs text-gray-400 mb-4">
            tags: ${(t.tags || []).map(x => `<span class="badge">${escapeHtml(x)}</span>`).join(" ") || "—"}
            · venture: ${escapeHtml(t.venture || "—")}
            · milestone: ${escapeHtml(t.milestone || "—")}
            · created: ${escapeHtml(t.created)}
          </div>
          <pre class="whitespace-pre-wrap bg-surface-raised border border-surface-border rounded p-3 text-xs leading-relaxed">${escapeHtml(t.body || "")}</pre>
        </div>`;
      render(host, html);
    }

    async function renderStats() {
      const host = document.getElementById("view-host");
      render(host, `<div class="ui-card"><span class="spinner mr-2"></span>computing stats…</div>`);
      const s = await api("/api/stats");
      const renderCounts = (obj) => Object.entries(obj || {}).sort((a,b)=>b[1]-a[1]).map(([k,v]) =>
        `<div class="ui-row"><span class="clamp-1">${escapeHtml(k)}</span><span class="ml-auto text-gray-400 font-mono">${v}</span></div>`
      ).join("");
      const cb = s.checkbox_progress || {};
      const pct = cb.total ? Math.round(100 * cb.checked / cb.total) : 0;
      const html = `
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          <div class="ui-card">
            <h3 class="display text-[0.65rem] text-accent-blue tracking-wider mb-3">SUMMARY</h3>
            <div class="ui-row"><span>active total</span><span class="ml-auto font-mono">${s.active_total}</span></div>
            <div class="ui-row"><span>drafts total</span><span class="ml-auto font-mono">${s.drafts_total}</span></div>
            <div class="ui-row"><span>checkbox progress</span><span class="ml-auto font-mono">${cb.checked}/${cb.total} · ${pct}%</span></div>
            <div class="bar mt-2"><div class="bar-fill" style="width:${pct}%"></div></div>
          </div>
          <div class="ui-card"><h3 class="display text-[0.65rem] text-accent-blue tracking-wider mb-3">BY STATUS</h3>${renderCounts(s.by_status)}</div>
          <div class="ui-card"><h3 class="display text-[0.65rem] text-accent-blue tracking-wider mb-3">BY PRIORITY</h3>${renderCounts(s.by_priority)}</div>
          <div class="ui-card lg:col-span-2"><h3 class="display text-[0.65rem] text-accent-blue tracking-wider mb-3">BY VENTURE</h3>${renderCounts(s.by_venture)}</div>
          <div class="ui-card"><h3 class="display text-[0.65rem] text-accent-blue tracking-wider mb-3">PERSONA · CREATOR</h3>${renderCounts(s.by_creator_persona) || '<span class="text-gray-500 text-xs">no persona overlay yet</span>'}</div>
        </div>`;
      render(host, html);
    }

    function renderPlaceholder(label, nextPhase) {
      const host = document.getElementById("view-host");
      const html = `
        <div class="ui-card text-center text-gray-400">
          <h3 class="display text-[0.7rem] text-accent-blue tracking-widest mb-2">${escapeHtml(label)}</h3>
          <p class="text-xs">populates in ${escapeHtml(nextPhase)}</p>
        </div>`;
      render(host, html);
    }

    /* ───────────── dispatcher ───────────── */
    async function renderRoute() {
      renderTabs();
      try {
        const r = state.route;
        if (r === "/")              return await renderKanban();
        if (r === "/list")          return await renderList();
        if (r === "/stats")         return await renderStats();
        if (r.startsWith("/task/")) return await renderDetail();
        if (r === "/graph")         return renderPlaceholder("DEPENDENCY NETWORK", "Phase 5.5b");
        if (r === "/embed")         return renderPlaceholder("EMBED 2D",          "Phase 5.5b");
        if (r === "/heatmap")       return renderPlaceholder("HEATMAP",           "Phase 5.5b");
        if (r === "/compass")       return renderPlaceholder("COMPASS",           "Phase 5.5b");
        renderPlaceholder("UNKNOWN", "—");
      } catch (e) {
        console.error(e);
        const host = document.getElementById("view-host");
        render(host, `<div class="ui-card border border-accent-red"><strong>error:</strong> ${escapeHtml(e.message || String(e))}</div>`);
      }
    }

    /* ───────────── keyboard ───────────── */
    document.addEventListener("keydown", (e) => {
      if (e.key === "/" && document.activeElement.tagName !== "INPUT") {
        e.preventDefault();
        document.getElementById("search").focus();
      }
    });
    document.getElementById("search").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        state.filters.q = e.target.value;
        if (state.route !== "/list") navigate("/list");
        else renderList();
      }
    });

    /* ───────────── init ───────────── */
    (async function init() {
      state.route = routeFromUrl();
      try {
        const v = await api("/healthz");
        document.getElementById("namespace-badge").textContent = v.namespace || "?";
        document.getElementById("version-badge").textContent = v.active_count != null
          ? `${v.active_count} active`
          : "ok";
      } catch (e) { /* surface in status line */ }
      renderRoute();
    })();
  </script>
</body>
</html>
